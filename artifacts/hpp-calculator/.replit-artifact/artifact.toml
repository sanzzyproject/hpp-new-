kind = "web"
previewPath = "/"
title = "Kalkulator HPP Bisnis"
version = "1.0.0"
id = "artifacts/hpp-calculator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19771
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/hpp-calculator run dev"

[services.env]
PORT = "19771"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/hpp-calculator", "run", "build"]
publicDir = "artifacts/hpp-calculator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
